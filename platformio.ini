; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
lib_deps =
	adafruit/Adafruit GFX Library
	adafruit/Adafruit SSD1306
	bodmer/TFT_eSPI
	mathertel/OneButton
	bblanchon/ArduinoJson
	adafruit/Adafruit INA219
; TFT_eSPI config for the TFT backend (src/tft.cpp, active when
; USE_TFT_DISPLAY=1 in include/display_config.h). Set here instead of
; editing the library's own User_Setup.h, so `pio lib update` can't
; silently wipe the pin config. Pins match docs/wiring.md:
;   TFT_MOSI=13 (D7), TFT_SCLK=14 (D5), TFT_CS=15 (D8), TFT_DC=0 (D3 -
;   NOT D6/GPIO12), TFT_RST=-1 (shared with the NodeMCU's own RST pin).
; SPI_FREQUENCY is conservative for jumper wiring - raise once confirmed
; reliable (try 8000000, then 20000000).
;
; No TOUCH_CS/TFT_MISO flags: this panel's touch controller was chased
; down and confirmed unpopulated (T_IRQ sits flat at 0V regardless of
; touch, even with T_CS forced permanently low) - see docs/wiring.md.
build_flags =
	-DUSER_SETUP_LOADED=1
	-DST7789_DRIVER=1
	-DTFT_WIDTH=240
	-DTFT_HEIGHT=320
	-DTFT_MOSI=13
	-DTFT_SCLK=14
	-DTFT_CS=15
	-DTFT_DC=0
	-DTFT_RST=-1
	-DLOAD_GLCD=1
	-DSPI_FREQUENCY=1000000
